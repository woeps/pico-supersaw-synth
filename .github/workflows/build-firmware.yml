name: Build Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'pico_sdk_import.cmake'
      - 'pico_extras_import.cmake'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
      PICO_EXTRAS_PATH: ${{ github.workspace }}/pico-extras
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache and install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib
          version: 1.0

      - name: Cache Pico SDK
        uses: actions/cache@v4
        id: cache-pico-sdk
        with:
          path: pico-sdk
          key: pico-sdk-2.1.1-${{ runner.os }}

      - name: Cache Pico Extras
        uses: actions/cache@v4
        id: cache-pico-extras
        with:
          path: pico-extras
          key: pico-extras-sdk-2.1.1-${{ runner.os }}

      - name: Checkout Pico SDK
        if: steps.cache-pico-sdk.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: 2.1.1
          path: pico-sdk
          submodules: recursive

      - name: Checkout Pico Extras
        if: steps.cache-pico-extras.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-extras
          ref: sdk-2.1.1
          path: pico-extras
          submodules: recursive

      - name: Configure
        run: cmake -B build -G Ninja

      - name: Build
        run: ninja -C build

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: firmware-uf2
          path: build/supersaw_midi_synth.uf2
          retention-days: 30

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: firmware-elf
          path: build/supersaw_midi_synth.elf
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download UF2
        uses: actions/download-artifact@v4
        with:
          name: firmware-uf2
          path: artifacts

      - name: Download ELF
        uses: actions/download-artifact@v4
        with:
          name: firmware-elf
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
