name: Build Firmware

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'pico_sdk_import.cmake'
      - 'pico_extras_import.cmake'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pico SDK
        uses: psf/rm-pico-action@v1
        with:
          pico-sdk-version: 2.1.1

      - name: Configure
        run: cmake -B build -G Ninja

      - name: Build
        run: ninja -C build

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: firmware-uf2
          path: build/supersaw_midi_synth.uf2
          retention-days: 30

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: firmware-elf
          path: build/supersaw_midi_synth.elf
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download UF2
        uses: actions/download-artifact@v4
        with:
          name: firmware-uf2
          path: artifacts

      - name: Download ELF
        uses: actions/download-artifact@v4
        with:
          name: firmware-elf
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
