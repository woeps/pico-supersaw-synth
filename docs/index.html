<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SuperSaw MIDI Synth Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
</head>
<body>
  <div id="app">Loading... (JavaScript required)</div>
  <script>
    // Set to true when deployed on GitHub Pages, false for local development
    var DEPLOYED = false;

    window.$docsify = {
      name: 'SuperSaw MIDI Synth',
      repo: 'https://github.com/woeps/supersaw-midi-synth',
      basePath: DEPLOYED ? 'https://raw.githubusercontent.com/woeps/supersaw-midi-synth/main/docs/' : './',
      loadSidebar: DEPLOYED ? 'https://raw.githubusercontent.com/woeps/supersaw-midi-synth/main/webpage/_sidebar.md' : '_sidebar.md',
      loadNavbar: false,
      coverpage: DEPLOYED ? 'https://raw.githubusercontent.com/woeps/supersaw-midi-synth/main/webpage/_coverpage.md' : '_coverpage.md',
      maxLevel: 4,
      subMaxLevel: 2,
      search: 'auto',
      search: {
        paths: 'auto',
        placeholder: 'Type to search',
        noData: 'No Results!',
        depth: 6,
        hideOtherSidebarContent: true
      },
      pagination: false,
      copyCode: {
        buttonText: 'Copy to clipboard',
        errorText: 'Failed to copy',
        successText: 'Copied'
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            if (/githubusercontent\.com/.test(vm.route.file)) {
              url = vm.route.file
                .replace('raw.githubusercontent.com', 'github.com')
                .replace(/\/master/, '/blob/master')
                .replace(/\/main/, '/blob/main')
            } else {
              url = 'https://github.com/woeps/supersaw-midi-synth/blob/main/docs/' + vm.route.file
            }
            var editHtml = '[:memo: Edit Document](' + url + ')\n'
            return editHtml + html
          })
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cmake.min.js"></script>
</body>
</html>
